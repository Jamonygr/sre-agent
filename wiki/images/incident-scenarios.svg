<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="SRE incident scenarios">
  <defs>
    <style>
      .title{font:700 30px Segoe UI,Arial,sans-serif;fill:#0f172a}
      .card{fill:#ffffff;stroke:#cbd5e1;stroke-width:2;rx:10}
      .h{font:700 17px Segoe UI,Arial,sans-serif;fill:#111827}
      .t{font:500 13px Segoe UI,Arial,sans-serif;fill:#475569}
      .badge{fill:#dbeafe;stroke:#60a5fa;rx:16}
      .b{font:700 12px Segoe UI,Arial,sans-serif;fill:#1d4ed8}
    </style>
  </defs>
  <rect width="1200" height="520" fill="#f1f5f9"/>
  <text x="52" y="58" class="title">Hands-on SRE incident scenarios</text>
  <g transform="translate(60 105)">
    <rect width="320" height="110" class="card"/>
    <rect x="22" y="20" width="74" height="28" class="badge"/>
    <text x="40" y="39" class="b">HEALTH</text>
    <text x="22" y="72" class="h">VM health monitoring</text>
    <text x="22" y="94" class="t">Heartbeat, availability, CPU, disk, events</text>
  </g>
  <g transform="translate(440 105)">
    <rect width="320" height="110" class="card"/>
    <rect x="22" y="20" width="76" height="28" class="badge"/>
    <text x="43" y="39" class="b">WEB</text>
    <text x="22" y="72" class="h">IIS outage</text>
    <text x="22" y="94" class="t">Stop W3SVC, alert, restart runbook</text>
  </g>
  <g transform="translate(820 105)">
    <rect width="320" height="110" class="card"/>
    <rect x="22" y="20" width="76" height="28" class="badge"/>
    <text x="45" y="39" class="b">CPU</text>
    <text x="22" y="72" class="h">High CPU</text>
    <text x="22" y="94" class="t">Metric alert and workbook signal</text>
  </g>
  <g transform="translate(60 260)">
    <rect width="320" height="110" class="card"/>
    <rect x="22" y="20" width="76" height="28" class="badge"/>
    <text x="40" y="39" class="b">DISK</text>
    <text x="22" y="72" class="h">Disk pressure</text>
    <text x="22" y="94" class="t">Temporary load file and cleanup runbook</text>
  </g>
  <g transform="translate(440 260)">
    <rect width="320" height="110" class="card"/>
    <rect x="22" y="20" width="76" height="28" class="badge"/>
    <text x="43" y="39" class="b">VM</text>
    <text x="22" y="72" class="h">Stopped VM</text>
    <text x="22" y="94" class="t">Availability alert and start runbook</text>
  </g>
  <g transform="translate(820 260)">
    <rect width="320" height="110" class="card"/>
    <rect x="22" y="20" width="96" height="28" class="badge"/>
    <text x="42" y="39" class="b">DIAG</text>
    <text x="22" y="72" class="h">Diagnostics collection</text>
    <text x="22" y="94" class="t">Service, event, disk, and process snapshot</text>
  </g>
</svg>
