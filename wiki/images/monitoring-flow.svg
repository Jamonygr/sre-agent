<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420" role="img" aria-labelledby="title desc">
  <title id="title">Monitoring Flow</title>
  <desc id="desc">Azure Monitor Agent sends VM telemetry through data collection rules to Log Analytics, alerts, workbooks, and dashboards.</desc>
  <rect width="1100" height="420" fill="#f8fafc"/>
  <text x="50" y="55" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Monitoring Flow</text>
  <g fill="#ffffff" stroke="#cbd5e1" stroke-width="2">
    <rect x="70" y="130" width="190" height="100" rx="8"/>
    <rect x="330" y="130" width="190" height="100" rx="8"/>
    <rect x="590" y="130" width="190" height="100" rx="8"/>
    <rect x="850" y="80" width="190" height="80" rx="8"/>
    <rect x="850" y="200" width="190" height="80" rx="8"/>
    <rect x="850" y="320" width="190" height="60" rx="8"/>
  </g>
  <text x="165" y="185" text-anchor="middle" fill="#0369a1" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">VMs + AMA</text>
  <text x="425" y="185" text-anchor="middle" fill="#166534" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">DCR</text>
  <text x="685" y="185" text-anchor="middle" fill="#7c2d12" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Log Analytics</text>
  <text x="945" y="128" text-anchor="middle" fill="#4c1d95" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Alerts</text>
  <text x="945" y="248" text-anchor="middle" fill="#854d0e" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Workbooks</text>
  <text x="945" y="358" text-anchor="middle" fill="#1f2937" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Dashboard</text>
  <path d="M260 180 H330" stroke="#64748b" stroke-width="3"/>
  <path d="M520 180 H590" stroke="#64748b" stroke-width="3"/>
  <path d="M780 180 C820 180 820 120 850 120" stroke="#64748b" stroke-width="3" fill="none"/>
  <path d="M780 180 C820 180 820 240 850 240" stroke="#64748b" stroke-width="3" fill="none"/>
  <path d="M780 180 C820 180 820 350 850 350" stroke="#64748b" stroke-width="3" fill="none"/>
</svg>
